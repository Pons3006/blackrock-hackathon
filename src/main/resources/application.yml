server:
  port: 5477
  tomcat:
    max-http-form-post-size: 50MB

spring:
  application:
    name: micro-savings
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-request-size: 50MB
  codec:
    max-in-memory-size: 50MB

springdoc:
  swagger-ui:
    path: /
    url: /openapi.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:false}
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: micro-savings
    description: Micro-savings Retirement API for BlackRock Hackathon
    version: 1.0.0
