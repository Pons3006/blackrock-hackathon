stages:
  - test
  - performance
  - build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository/

# ── Unit & integration tests (stress tag excluded by default) ────────
unit-test:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - apk add --no-cache maven
  script:
    - mvn test -q
  artifacts:
    when: always
    paths:
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/TEST-*.xml

# ── Performance / stress tests (10^5 transactions, sub-second SLA) ───
performance-test:
  stage: performance
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - apk add --no-cache maven
  script:
    - mvn test -Pstress -q
  artifacts:
    when: always
    paths:
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/TEST-*.xml
  allow_failure: false

# ── Docker image build ───────────────────────────────────────────────
docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
